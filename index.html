<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ruby Electronics</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f8fb;
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 9999;
}
#splash img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* HEADER */
header {
  background: #0d6efd;
  color: white;
  text-align: center;
  padding: 14px;
  font-size: 18px;
}

/* CATEGORY */
.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 8px;
  background: white;
}
.cat-btn {
  padding: 8px 14px;
  border-radius: 20px;
  background: #e3f0ff;
  cursor: pointer;
}
.active {
  background: #0d6efd;
  color: white;
}

/* PRODUCTS */
.container {
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}
.card img {
  width: 100%;
  height: 110px;
  object-fit: cover;
}
.card-body {
  padding: 8px;
}
.price {
  color: #0d6efd;
  font-weight: bold;
}

/* QTY */
.qty {
  display: flex;
  justify-content: space-between;
}
.qty button {
  background: #0d6efd;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 5px;
}

/* ORDER BAR */
#orderBar {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 10px;
  display: none;
}
.order-btn {
  width: 100%;
  padding: 14px;
  background: #0d6efd;
  border: none;
  border-radius: 10px;
  color: white;
}

/* MODAL */
.modal {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 0;
  background: rgba(0,0,0,0.5);
  transition: 0.3s;
}

.modal.active {
  height: 100%;
}

.modal-content {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 85%;
  background: white;
  border-radius: 16px 16px 0 0;
  display: flex;
  flex-direction: column;
}

.modal-header {
  padding: 12px;
  background: #0d6efd;
  color: white;
  display: flex;
  justify-content: space-between;
}

.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.modal-footer {
  padding: 10px;
  border-top: 1px solid #ddd;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.back-btn {
  cursor: pointer;
}
</style>
</head>

<body>

<div id="splash">
<img src="Assets/Splash Screen.png">
</div>

<header>Ruby Electronics</header>

<div class="categories" id="cats"></div>
<div class="container" id="items"></div>

<div id="orderBar">
<button class="order-btn" onclick="openForm()">PLACE ORDER</button>
</div>

<div class="modal" id="formModal">
  <div class="modal-content">

    <div class="modal-header">
      <span class="back-btn" onclick="closeForm()">← Back</span>
      <span>Enter Details</span>
      <span></span>
    </div>

    <div class="modal-body">
      <input id="name" placeholder="Name">
      <input id="mobile" placeholder="Mobile">
      <textarea id="address" placeholder="Address"></textarea>
    </div>

    <div class="modal-footer">
      <button class="order-btn" onclick="placeOrder()">Submit Order</button>
    </div>

  </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxW0sr29AJiCzfT1ATohTtxhy6zDqUnr0VrbL6Ir8gNCbdJuyCWTwwP1muumQi1suQXtw/exec";
const PHONE = "917838837904";

let products=[], qty={}, currentCat="All", categories=[];

setTimeout(()=>{document.getElementById("splash").style.display="none";},2000);

// FETCH
fetch(API_URL)
.then(res=>res.json())
.then(data=>{
  products = data.map(p => ({
    ...p,
    category: p.category && p.category.trim() ? p.category : "Accessories"
  }));

  categories = ["All", ...new Set(products.map(p=>p.category))];

  renderCats();
  renderProducts();
});

function renderCats(){
  let html="";
  categories.forEach(c=>{
    html+=`<div class="cat-btn" onclick="selectCat('${c}')">${c}</div>`;
  });
  document.getElementById("cats").innerHTML=html;
}

function selectCat(c){
  currentCat=c;
  renderProducts();
}

function renderProducts(){
  let html="";
  products.forEach((p,i)=>{
    if(currentCat==="All" || p.category===currentCat){
      html+=`
      <div class="card">
        <img src="${p.image}">
        <div class="card-body">
          ${p.name}
          <div class="price">₹${p.price}</div>

          <div class="qty">
            <button onclick="change(${i},-1)">-</button>
            <span id="q${i}">0</span>
            <button onclick="change(${i},1)">+</button>
          </div>
        </div>
      </div>`;
    }
  });
  document.getElementById("items").innerHTML=html;
}

function change(i,val){
  qty[i]=(qty[i]||0)+val;
  if(qty[i]<0) qty[i]=0;

  document.getElementById("q"+i).innerText=qty[i];

  document.getElementById("orderBar").style.display =
    Object.values(qty).some(q=>q>0) ? "block":"none";
}

function openForm(){
  document.getElementById("formModal").classList.add("active");
}
function closeForm(){
  document.getElementById("formModal").classList.remove("active");
}

function placeOrder(){

  let name=document.getElementById("name").value;
  let mobile=document.getElementById("mobile").value;
  let address=document.getElementById("address").value;

  if(!name || !mobile){
    alert("Fill Name & Mobile");
    return;
  }

  let msg = "*New Order Request - Ruby Electronics*%0A%0A";
  msg += "[Order Details]%0A";

  let total = 0;

  products.forEach((p,i)=>{
    if(qty[i]>0){
      let itemTotal = p.price * qty[i];
      total += itemTotal;
      msg += `- ${p.name} (Rs.${p.price}) x${qty[i]} = Rs.${itemTotal}%0A`;
    }
  });

  msg += `%0ATotal Amount: Rs.${total}%0A%0A`;

  msg += "[Customer Details]%0A";
  msg += `Name: ${name}%0A`;
  msg += `Mobile: ${mobile}%0A`;
  msg += `Address: ${address}%0A%0A`;

  msg += "Please confirm this order.";

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({name,mobile,address,items:msg})
  });

  window.open(`https://wa.me/${PHONE}?text=${msg}`);
}

</script>

</body>
</html>
