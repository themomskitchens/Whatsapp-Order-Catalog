<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Mom's Kitchen</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:sans-serif;background:#fff}

/* SPLASH */
#splash{
position:fixed;width:100%;height:100%;
background:#FECD50;
display:flex;align-items:center;justify-content:center;
z-index:9999;overflow:hidden;
}
#splash video{
width:100%;
height:100%;
object-fit:cover;
}

/* HEADER */
header{
background:#FECD50;
color:#000;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* SPECIAL */
.special{
background:#fff8dc;
margin:10px;
padding:12px;
border-radius:10px;
}

/* CATEGORY */
.categories{
display:flex;overflow:auto;
gap:8px;padding:10px;background:#fff;
}
.cat{
padding:6px 12px;
background:#fff3b0;
border-radius:20px;
cursor:pointer;
}

/* ITEMS */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.card img{
width:100%;
height:110px;
object-fit:cover;
}
.card-body{padding:8px}

.price{color:#000;font-weight:bold}

.qty{
display:flex;
justify-content:space-between;
}
.qty button{
background:#FECD50;
border:none;
padding:5px;
border-radius:5px;
}

/* CART */
#cart{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:10px;
display:none;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}
#cart button{
width:100%;
padding:12px;
background:#FECD50;
border:none;
border-radius:8px;
}

/* MODAL */
.modal{
position:fixed;
bottom:0;
width:100%;
height:0;
background:rgba(0,0,0,0.5);
transition:0.3s;
}
.modal.active{height:100%}

.modal-box{
position:absolute;
bottom:0;
width:100%;
height:90%;
background:white;
border-radius:15px 15px 0 0;
display:flex;
flex-direction:column;
}

.modal-body{
flex:1;
overflow:auto;
padding:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <video autoplay muted playsinline id="splashVideo">
    <source src="Assets/2894881-uhd_3840_2160_24fps (1).mp4" type="video/mp4">
  </video>
</div>

<header>The Mom's Kitchen</header>

<div class="special" id="todaySpecial">Loading...</div>

<div class="categories" id="cats"></div>
<div class="container" id="items"></div>

<div id="cart">
<button onclick="openForm()">Review & Place Order</button>
</div>

<!-- MODAL -->
<div class="modal" id="form">
<div class="modal-box">

<div style="padding:10px;background:#FECD50;">
Order Summary
</div>

<div class="modal-body" id="summary"></div>

<div style="padding:10px;">
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()" style="width:100%;padding:12px;background:#FECD50;border:none;border-radius:8px;">
Confirm Order
</button>
</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwD4bw4P9io0ysWIVHeCTD11t7YI1rvQFVUjyP02IvReP-KCBnz_oWgO7SzaalqHedzHw/exec";
const PHONE="917557575736";

let products=[],qty={},cat="All",cats=[];

// SPLASH
const splash = document.getElementById("splash");
const splashVideo = document.getElementById("splashVideo");

splashVideo.onended = ()=>{ splash.style.display="none"; };
setTimeout(()=>{ splash.style.display="none"; },4000);

// FETCH
fetch(API)
.then(r=>r.json())
.then(data=>{
products=data.map(p=>({
...p,
category:p.category && p.category.trim()?p.category:"Food",
special:p.special?p.special.toUpperCase():"NO"
}));

cats=["All",...new Set(products.map(p=>p.category))];

renderCats();
renderItems();
renderSpecial();
});

// CATEGORY
function renderCats(){
let h="";
cats.forEach(c=>{
h+=`<div class="cat" onclick="filterCat('${c}')">${c}</div>`;
});
document.getElementById("cats").innerHTML=h;
}

function filterCat(c){
cat=c;
renderItems();
}

// ITEMS
function renderItems(){
let h="";
products.forEach((p,i)=>{

let img=p.image && p.image.trim()
? p.image
: "https://via.placeholder.com/300x200?text=Food";

if(cat==="All"||p.category===cat){
h+=`
<div class="card">
<img src="${img}" onerror="this.src='https://via.placeholder.com/300x200?text=Food'">
<div class="card-body">
${p.name}
<div class="price">₹${p.price}</div>

<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
<span id="q${i}">0</span>
<button onclick="changeQty(${i},1)">+</button>
</div>

</div>
</div>`;
}
});
document.getElementById("items").innerHTML=h;
}

// SPECIAL
function renderSpecial(){
let sp=products.find(p=>p.special==="YES");

if(sp){
document.getElementById("todaySpecial").innerHTML=
`🍱 <b>Today's Special:</b> ${sp.name} @ ₹${sp.price}`;
}else{
document.getElementById("todaySpecial").innerHTML="No Special Today";
}
}

// QTY
function changeQty(i,v){
qty[i]=(qty[i]||0)+v;
if(qty[i]<0) qty[i]=0;

document.getElementById("q"+i).innerText=qty[i];

document.getElementById("cart").style.display=
Object.values(qty).some(x=>x>0)?"block":"none";
}

// FORM
function openForm(){
document.getElementById("form").classList.add("active");

let sum="",total=0;

products.forEach((p,i)=>{
if(qty[i]>0){
let t=p.price*qty[i];
total+=t;
sum+=`${p.name} x${qty[i]} = ₹${t}<br>`;
}
});

sum+=`<hr><b>Total: ₹${total}</b>`;
document.getElementById("summary").innerHTML=sum;
}

// ORDER
function placeOrder(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let address=document.getElementById("address").value;

if(!name||!mobile){
alert("Fill Name & Mobile");
return;
}

let total=0;
let cart=[];

let msg="*New Food Order - Mom's Kitchen*%0A%0A";
msg+="[Order Details]%0A";

products.forEach((p,i)=>{
if(qty[i]>0){
let t=p.price*qty[i];
total+=t;

cart.push({
name:p.name,
price:p.price,
qty:qty[i]
});

msg+=`- ${p.name} (Rs.${p.price}) x${qty[i]} = Rs.${t}%0A`;
}
});

msg+=`%0ATotal Amount: Rs.${total}%0A%0A`;
msg+=`Name: ${name}%0AMobile: ${mobile}%0AAddress: ${address}`;

fetch(API,{
method:"POST",
body:JSON.stringify({
name:name,
mobile:mobile,
address:address,
cart:cart
})
});

window.open(`https://wa.me/${PHONE}?text=${msg}`);
}

</script>

</body>
</html>
